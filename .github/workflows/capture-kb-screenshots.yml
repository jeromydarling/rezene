name: Capture KB screenshots

# Drives the live admin app with headless Chromium to photograph every module,
# then commits the PNGs back so each Knowledge Base chapter renders a real hero
# image. Runs on a CI runner because this project's dev sandbox proxies raw
# browser TLS (ERR_CONNECTION_RESET); a plain GitHub runner has open network.
#
# No secrets required: by default the capture signs into the public demo shop
# with its well-known read-only login (see DEMO_VIEWER_PASSWORD in
# src/worker/services/shops.ts). To photograph a different shop instead, set
# repository secrets KB_EMAIL / KB_PASSWORD (and optionally the KB_BASE
# variable) — they override the demo defaults.
#
# Run it: Actions → "Capture KB screenshots" → Run workflow (pick the branch).
# Staleness protection: besides the manual dispatch, this re-runs after every
# production "Migrate & secrets" run on main (i.e. after each merged change
# ships) and weekly as a backstop. The capture script only rewrites a PNG when
# >0.3% of its pixels changed, so date text and counters don't churn commits —
# a shot only updates when a section or feature actually moved. The refresh
# commit says [skip ci], which also keeps it from re-triggering this workflow.
on:
  workflow_dispatch:
    inputs:
      base:
        description: "Target site (overrides KB_BASE variable)"
        required: false
        default: ""
      force:
        description: "Rewrite every shot even if visually unchanged"
        required: false
        default: "false"
  workflow_run:
    workflows: ["Migrate & secrets"]
    types: [completed]
    branches: [main]
  schedule:
    - cron: "0 7 * * 1" # weekly backstop, Monday 07:00 UTC

concurrency:
  group: kb-screenshots-${{ github.ref }}
  cancel-in-progress: true

jobs:
  capture:
    # For deploy-triggered runs, only capture after a successful run.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      # Workers Builds ships the code separately from the triggering workflow;
      # give the new deploy a moment to be what we photograph.
      - name: Let the deploy settle
        if: github.event_name == 'workflow_run'
        run: sleep 180

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright + Chromium
        run: |
          npm install playwright@1.48.0 pixelmatch pngjs >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Capture screenshots
        env:
          # Falls back to the public demo shop's read-only login when the
          # secrets are unset (the capture script owns those defaults).
          KB_EMAIL: ${{ secrets.KB_EMAIL }}
          KB_PASSWORD: ${{ secrets.KB_PASSWORD }}
          KB_BASE: ${{ github.event.inputs.base || vars.KB_BASE }}
          KB_FORCE: ${{ github.event.inputs.force == 'true' && '1' || '' }}
        run: node scripts/capture-kb-screenshots.mjs

      - name: Commit screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/kb/shots
          if git diff --staged --quiet; then
            echo "No screenshot changes to commit."
          else
            git commit -m "kb: refresh module screenshots [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
