# Deploys the Worker (static assets + API) to Cloudflare.
#
# One-time repository setup (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   (required) — token with Workers Scripts:Edit,
#                          D1:Edit, Workers KV:Edit, Workers R2:Edit
#   CLOUDFLARE_ACCOUNT_ID  (recommended) — the Cloudflare account id
#
# Optional application secrets — any that are set as GitHub secrets are
# synced to the Worker after deploy (skipped when absent):
#   STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_PUBLISHABLE_KEY,
#   ANTHROPIC_API_KEY, SESSION_SECRET, ADMIN_EMAIL, ADMIN_INITIAL_PASSWORD
#
# The D1 database, KV namespace, and R2 bucket referenced in wrangler.toml
# already exist — this workflow only migrates and deploys.

name: Deploy

# The active development branch deploys too: Cloudflare Workers Builds
# (dashboard-connected) ships this branch's *code* on every push but never
# runs migrations, so a push containing a new migration would break
# production until this workflow applies it. Keeping the branch in the
# trigger list means migrations, deploy, and secret sync always travel
# together. Trim the list back to [main] once development moves to PRs.
on:
  push:
    branches: [main, claude/cloudflare-vite-react-scaffold-aluycl]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc -b

      - name: Build (client + worker bundle)
        run: npx vite build

      - name: Apply D1 migrations (remote)
        run: npx wrangler d1 migrations apply maison-atlantique-db --remote

      - name: Deploy Worker
        run: npx wrangler deploy

      - name: Sync application secrets to the Worker
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_INITIAL_PASSWORD: ${{ secrets.ADMIN_INITIAL_PASSWORD }}
        run: |
          for name in STRIPE_SECRET_KEY STRIPE_WEBHOOK_SECRET STRIPE_PUBLISHABLE_KEY \
                      ANTHROPIC_API_KEY SESSION_SECRET ADMIN_EMAIL ADMIN_INITIAL_PASSWORD; do
            value="${!name}"
            if [ -z "$value" ]; then
              echo "skipped $name (not set as a GitHub secret)"
              continue
            fi
            # Retry transient network failures — the deploy itself already
            # succeeded by this point, so don't fail the run on a blip.
            for attempt in 1 2 3; do
              if printf '%s' "$value" | npx wrangler secret put "$name"; then
                echo "synced $name"
                break
              elif [ "$attempt" = 3 ]; then
                echo "failed to sync $name after 3 attempts" >&2
                exit 1
              else
                echo "retrying $name (attempt $attempt failed)"
                sleep $((attempt * 5))
              fi
            done
          done
