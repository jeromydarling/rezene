# Deploys the Worker (static assets + API) to Cloudflare.
#
# One-time repository setup (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   (required) — token with Workers Scripts:Edit,
#                          D1:Edit, Workers KV:Edit, Workers R2:Edit
#   CLOUDFLARE_ACCOUNT_ID  (recommended) — the Cloudflare account id
#
# Optional application secrets — any that are set as GitHub secrets are
# synced to the Worker after deploy (skipped when absent):
#   STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_PUBLISHABLE_KEY,
#   ANTHROPIC_API_KEY, SESSION_SECRET, ADMIN_EMAIL, ADMIN_INITIAL_PASSWORD
#
# The D1 database, KV namespace, and R2 bucket referenced in wrangler.toml
# already exist — this workflow only migrates and deploys.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc -b

      - name: Build (client + worker bundle)
        run: npx vite build

      - name: Apply D1 migrations (remote)
        run: npx wrangler d1 migrations apply maison-atlantique-db --remote

      - name: Deploy Worker
        run: npx wrangler deploy

      - name: Sync application secrets to the Worker
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_INITIAL_PASSWORD: ${{ secrets.ADMIN_INITIAL_PASSWORD }}
        run: |
          for name in STRIPE_SECRET_KEY STRIPE_WEBHOOK_SECRET STRIPE_PUBLISHABLE_KEY \
                      ANTHROPIC_API_KEY SESSION_SECRET ADMIN_EMAIL ADMIN_INITIAL_PASSWORD; do
            value="${!name}"
            if [ -n "$value" ]; then
              printf '%s' "$value" | npx wrangler secret put "$name"
              echo "synced $name"
            else
              echo "skipped $name (not set as a GitHub secret)"
            fi
          done
