name: CI

on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (app + worker)
        run: npx tsc -b

      - name: Build (client + worker bundle)
        run: npx vite build

      - name: Validate migrations against a fresh local D1
        run: npx wrangler d1 migrations apply maison-atlantique-db --local
