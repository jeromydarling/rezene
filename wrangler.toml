# Maison Atlantique — Cloudflare Workers configuration
#
# Full-stack Worker: serves the built Vite client via static assets and the
# API from src/worker. Local dev runs through @cloudflare/vite-plugin
# (single `npm run dev` server, Worker executing in workerd).
#
# The D1 database, KV namespace, and R2 bucket below are ALREADY CREATED in
# the Cloudflare account — the ids are real. Deployment runs through GitHub
# Actions (.github/workflows/deploy.yml); it applies D1 migrations and
# deploys the Worker. See README "Deployment".

# NOTE: the LIVE production Worker that serves verto.style is the script named
# "verto" — Cloudflare Workers Builds deploys under its own dashboard-configured
# name, not this one. This `name` is retained only for local `wrangler` calls;
# CI (.github/workflows/deploy.yml) syncs secrets to "verto" explicitly. Don't
# run a bare `wrangler deploy` from this config — it would recreate a stray,
# unrouted "rezene" script.
name = "rezene"
main = "./src/worker/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
not_found_handling = "single-page-application"
# API traffic and public R2 media must reach the Worker, never the asset
# layer. Document routes also go worker-first so per-page SEO meta tags can
# be injected into index.html at the edge (src/worker/services/seo.ts).
# Hashed bundles under /assets/ go worker-first too: the asset layer's SPA
# fallback would answer a stale bundle URL with index.html as 200 text/html
# (a blank white app); the worker converts that fallback into a real 404
# (serveDocument in src/worker/index.ts).
run_worker_first = ["/*"]

[observability]
enabled = true

# Non-secret runtime config. Secrets (Stripe, Anthropic, session) belong in
# `wrangler secret put` / .dev.vars — never here.
[vars]
# Deployed value. Local dev overrides this via .dev.vars (APP_ENV=development).
APP_ENV = "production"
APP_URL = "https://verto.style"
# Flip to "1" only after POST /api/admin/platform/migrate-primary has copied
# the primary shop into its Durable Object (see services/tenant-db.ts).
PRIMARY_ON_DO = "1"
# Sentry error monitoring (publishable DSN, not a secret). Empty = disabled.
SENTRY_DSN = "https://b1fbaa8166b49eb0f2db38f2fc791193@o4511311951298560.ingest.us.sentry.io/4511720342487040"
BRAND_NAME = "Rezene"
BRAND_SLUG = "rezene"
R2_PUBLIC_BASE_URL = ""
# Founder notifications (Cloudflare Email Service). Sends no-op until both
# are set: FROM must be on a domain onboarded to Email Service, TO must be a
# verified destination address in the account (verified sends are free).
NOTIFY_EMAIL_FROM = ""
NOTIFY_EMAIL_TO = ""
# Buyer transactional email (order confirmations) — same EMAIL binding.
# Sending to arbitrary recipients requires the domain to be onboarded to
# Email Sending; set this to an address on that domain to activate.
BUYER_EMAIL_FROM = ""
# HQ marketing (Verto's own audience): sender falls back to BUYER_EMAIL_FROM;
# batch is sends per 5-min drain tick; postal address is the CAN-SPAM footer.
MARKETING_EMAIL_FROM = ""
MARKETING_REPLY_TO = "gardener@thecros.app"
MARKETING_BATCH_PER_TICK = "10"
MARKETING_POSTAL_ADDRESS = ""
# Promo-video render backend. RENDER_REPO's GitHub Actions do the heavy
# Playwright→ffmpeg render off-Worker; set the matching secrets with
# `wrangler secret put RENDER_CALLBACK_SECRET` and `... GITHUB_DISPATCH_TOKEN`.
# Renders stay disabled (free preview still works) until both are set.
RENDER_REPO = "jeromydarling/rezene"
VIDEO_EXPORT_PRICE_CENTS = "1900"
# Lulu print-on-demand (branded lookbook print & mail). Platform-brokered:
# Verto's own Lulu account fulfils, marked up by LULU_MARKUP_PCT. Set
# LULU_CLIENT_KEY / LULU_CLIENT_SECRET as secrets; start in sandbox.
LULU_ENV = "sandbox"
LULU_MARKUP_PCT = "35"
# Hostname a shop points a CNAME record at to connect their own domain.
# Set to the Cloudflare-for-SaaS fallback origin once configured.
CUSTOM_DOMAIN_TARGET = "verto.style"

[[d1_databases]]
binding = "DB"
database_name = "maison-atlantique-db"
database_id = "efe744ff-e3dd-41a4-b61e-b93cd79e2139"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "FILES"
bucket_name = "maison-atlantique-files"

[[kv_namespaces]]
binding = "KV"
id = "79bcbb9c583f4ad0b90f715897bd8d2e"

# Cloudflare Email Service: unrestricted binding. Before a sending domain is
# onboarded to Email Sending it reaches only verified destination addresses
# (founder notifications); after onboarding it can send to any recipient
# (buyer confirmations). Local dev simulates sends (logged, not delivered).
[[send_email]]
name = "EMAIL"

# Workers AI: lightweight content translation (storefront language toggle).
[ai]
binding = "AI"

# Cloudflare Images (transformations): server-side thumbnails for the Files
# page — a 1MB render becomes a ~3KB webp tile. The thumb route falls back to
# streaming the original whenever the binding is missing or a transform fails.
[images]
binding = "IMAGES"

# Per-shop SQLite databases: every non-primary shop's data lives in its own
# ShopDatabase Durable Object — physical tenant isolation, one object per
# shop, schema bootstrapped from the embedded migrations.
[[durable_objects.bindings]]
name = "SHOP_DB"
class_name = "ShopDatabase"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ShopDatabase"]

# 06:00 daily — ops digest / low-stock + late-task sweep.
# :30 hourly — publish scheduled pages & journal posts that are due.
# (see scheduled handler in src/worker/index.ts)
[triggers]
# 06:00 daily ops sweep · :30 hourly publisher · every 5 min: HQ marketing
# send-queue drain (paced sends through Email Sending's reputation quota).
crons = ["0 6 * * *", "30 * * * *", "*/5 * * * *"]

# --- Future bindings (uncomment when the account has them enabled) -----------
# Async pipelines (webhook fan-out, AI batch jobs, export rendering):
